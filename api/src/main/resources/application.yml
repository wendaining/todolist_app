server:
  port: 8080

spring:
  application:
    name: todolist-api
  datasource:
    url: jdbc:sqlite:./data/todolist.db
    driver-class-name: org.sqlite.JDBC
  sql:
    init:
      mode: always

app:
  security:
    bootstrapTokens: dev-token-change-me
    tokenTtlHours: 720
    rateLimitPerMinute: 120
